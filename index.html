<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>망각전야 (Morimens) 팬 페이지</title>
    <style>
        /* 기본 스타일 초기화 및 배경색 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #192326;
            color: #e3e8e9;
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
        }

        /* 1. 초기 화면 (망각전야 홈페이지 1) */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            background: url(front.jpg) center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 하단 배경색과 자연스럽게 겹치도록 그라데이션 마스크 처리 */
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
            transition: opacity 0.3s ease;
        }

        /* 2. 스크롤 시 나타날 고정 상단 배너 (세로 축소 버전) */
        .top-banner-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 180px; 
            background: url(top.jpg) center/cover no-repeat;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            border-bottom: 2px solid rgba(255,255,255,0.05);
        }
        /* 배너 내부의 자연스러운 어둠 연출 */
        .top-banner-view::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, rgba(25, 35, 38, 0) 0%, #192326 100%);
        }

        /* 스크롤이 내려갔을 때 활성화될 클래스 */
        body.scrolled .hero-section {
            opacity: 0.3;
        }
        body.scrolled .top-banner-view {
            opacity: 1;
            visibility: visible;
        }

        /* 메인 콘텐츠 영역 (버튼들이 위치할 곳) */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
            position: relative;
            z-index: 10;
        }
        
        /* 상단 배너가 고정되었을 때 콘텐츠가 가려지지 않도록 여백 확보 */
        body.scrolled .main-content {
            margin-top: 140px;
        }

        /* 타이틀 섹션 (정보모음) */
        .section-title {
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: #9eb1b6;
            text-transform: uppercase;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        /* ========================================================
           게임 내 이벤트 영역 - 10초 자동 순환 및 PC 화살표 내장 슬라이더
           ======================================================== */
        .event-slider-container {
            width: 100%;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background: #11181a;
        }

        /* 격자형 톤앤매너 유지를 위한 안쪽 미세 테두리 */
        .event-slider-container::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            pointer-events: none;
            z-index: 5;
        }

        .slider-wrapper {
            display: flex;
            width: 100%;
            /* [변경] 고정 높이를 없애고 원본 이미지 비율(예: 16:9)을 유지하도록 설정 */
            aspect-ratio: 16 / 9; 
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide-item {
            min-width: 100%;
            height: 100%;
            position: relative;
        }

        /* 실제 스와이프될 이미지 파일명 등록 구역 */
        .slide-item:nth-child(1) { background: url('콜라보 배너 사이트.webp') center/cover no-repeat; }
        .slide-item:nth-child(2) { background: url('콜라보 이벤트 스토리.png') center/cover no-repeat; }
        .slide-item:nth-child(3) { background: url('콜라보 이벤트 보상 몽록.webp') center/cover no-repeat; }
        
        /* 이미지 로드 전 또는 미등록 상태 시 연출될 다크 가이드 스킨 */
        .slide-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #111719 0%, #1c272a 100%);
            color: #8a999d;
        }
        
        /* [추가] 링크 이동 가능 슬라이더용 커서 스타일 인터랙션 */
        .slide-item.clickable {
            cursor: pointer;
        }
        .slide-item.clickable:hover .slide-placeholder h3 {
            color: #ffffff;
            text-decoration: underline;
        }

        .slide-placeholder h3 {
            font-size: 1.5rem;
            color: #ccd7d9;
            margin-bottom: 8px;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        /* PC용 내비게이션 좌우 제어 화살표 디자인 */
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: rgba(17, 24, 26, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ccd7d9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.25s ease;
        }
        /* 화살표 내부 인게임 사각 싱크를 위한 앵글 처리 */
        .slider-arrow-inner {
            width: 12px;
            height: 12px;
            border-top: 2px solid #ccd7d9;
            border-right: 2px solid #ccd7d9;
            transition: border-color 0.25s;
        }
        .arrow-left { left: 20px; }
        .arrow-left .slider-arrow-inner { transform: rotate(-135deg); }
        .arrow-right { right: 20px; }
        .arrow-right .slider-arrow-inner { transform: rotate(45deg); }

        .slider-arrow:hover {
            background: #162023;
            border-color: rgba(255, 255, 255, 0.4);
        }
        .slider-arrow:hover .slider-arrow-inner {
            border-color: #ffffff;
        }

        /* 모바일 디바이스 등 터치 환경에서는 화살표를 자동 숨김 처리 */
        @media (max-width: 768px) {
            .slider-arrow { display: none; }
        }

        /* 하단 인디케이터 도트 래퍼 */
        .slider-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 6;
        }

        .dot {
            width: 10px;
            height: 10px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.4);
            transform: rotate(45deg);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* ========================================================
           3. 버튼 디자인 레이아웃 (남은 4개 필수 정보 그리드)
           ======================================================== */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .menu-item {
            position: relative;
            background: #11181a; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 140px;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            pointer-events: none;
        }

        .menu-item:hover {
            background: #162023;
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.05), 0 10px 20px rgba(0,0,0,0.4);
            transform: translateY(-2px);
        }

        .menu-item span {
            font-size: 1.15rem;
            font-weight: 500;
            color: #ccd7d9;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            transition: color 0.3s;
        }
        .menu-item:hover span {
            color: #ffffff;
        }

        .menu-item .icon-deco {
            width: 32px;
            height: 32px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            transform: rotate(45deg);
            transition: all 0.3s;
            position: relative;
        }
        .menu-item:hover .icon-deco {
            border-color: #ffffff;
            transform: rotate(135deg);
        }
    </style>
</head>
<body>

    <div class="hero-section" id="hero"></div>

    <div class="top-banner-view" id="topBanner"></div>

    <div class="main-content">
        <h2 class="section-title">정보모음</h2>
        
        <div class="event-slider-container">
            <div class="slider-arrow arrow-left" onclick="prevSlide()"><div class="slider-arrow-inner"></div></div>
            <div class="slider-arrow arrow-right" onclick="nextSlide()"><div class="slider-arrow-inner"></div></div>

            <div class="slider-wrapper" id="sliderWrapper">
                <div class="slide-item clickable" onclick="window.open('https://www.bokyakuzenya.com/sp', '_blank')"></div>
                <div class="slide-item clickable" onclick="navigateToPage('event-detail-2')"></div>
                <div class="slide-item clickable" onclick="navigateToPage('event-detail-3')"></div>
            </div>
            
            <div class="slider-dots" id="sliderDots">
                <div class="dot active" onclick="goToSlide(0)"></div>
                <div class="dot" onclick="goToSlide(1)"></div>
                <div class="dot" onclick="goToSlide(2)"></div>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="navigateToPage('awakening')">
                <div class="icon-deco"></div>
                <span>각성체 정보</span>
            </div>
            <div class="menu-item" onclick="navigateToPage('myeongryun')">
                <div class="icon-deco"></div>
                <span>명륜 정보</span>
            </div>
            <div class="menu-item" onclick="navigateToPage('secret-contract')">
                <div class="icon-deco"></div>
                <span>비밀계약 정보</span>
            </div>
            <div class="menu-item" onclick="navigateToPage('coupon-code')">
                <div class="icon-deco"></div>
                <span>교환코드</span>
            </div>
        </div>
    </div>

    <script>
        // 상단 배너 스크롤 트래킹
        window.addEventListener('scroll', function() {
            const body = document.body;
            if (window.scrollY > 150) {
                body.classList.add('scrolled');
            } else {
                body.classList.remove('scrolled');
            }
        });

        // 10초 주기 무한 루프 배너 기믹
        let currentIdx = 0;
        const sliderWrapper = document.getElementById('sliderWrapper');
        const dots = document.querySelectorAll('.dot');
        const totalSlides = dots.length;
        const slideInterval = 10000; 

        function updateSlider() {
            sliderWrapper.style.transform = `translateX(-${currentIdx * 100}%)`;
            dots.forEach((dot, idx) => {
                if (idx === currentIdx) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        function nextSlide() {
            currentIdx++;
            if (currentIdx >= totalSlides) {
                currentIdx = 0;
            }
            updateSlider();
            resetTimer();
        }

        function prevSlide() {
            currentIdx--;
            if (currentIdx < 0) {
                currentIdx = totalSlides - 1;
            }
            updateSlider();
            resetTimer();
        }

        function goToSlide(idx) {
            currentIdx = idx;
            updateSlider();
            resetTimer();
        }

        let autoSlider = setInterval(nextSlide, slideInterval);

        function resetTimer() {
            clearInterval(autoSlider);
            autoSlider = setInterval(nextSlide, slideInterval);
        }

        // 하단 정보 버튼 및 추가 배너 클릭 시 하위 컴포넌트 페이지 리디렉션 라우터 함수
        function navigateToPage(menuType) {
            switch (menuType) {
                case 'awakening':
                    window.location.href = 'awakening.html'; 
                    break;
                case 'myeongryun':
                    window.location.href = 'myeongryun.html'; 
                    break;
                case 'secret-contract':
                    window.location.href = 'secret_contract.html'; 
                    break;
                case 'coupon-code':
                    window.location.href = 'coupon_code.html'; 
                    break;
                // 배너 2, 3번 클릭 핸들러 추가 커스텀 처리 구역
                case 'event-detail-2':
                    window.location.href = 'event_detail_2.html';
                    break;
                case 'event-detail-3':
                    window.location.href = 'event_detail_3.html';
                    break;
                default:
                    console.log('연결 타겟이 매핑되지 않았습니다.');
            }
        }
    </script>
</body>
</html>
