<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>망각전야 (Morimens) 팬 페이지</title>
    <style>
        /* 기본 스타일 초기화 및 배경색 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #192326;
            color: #e3e8e9;
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
        }

        /* 1. 초기 화면 (망각전야 홈페이지 1) */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            background: url(front.jpg) center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 하단 배경색과 자연스럽게 겹치도록 그라데이션 마스크 처리 */
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
            transition: opacity 0.3s ease;
        }

        /* 2. 스크롤 시 나타날 고정 상단 배너 (세로 축소 버전) */
        .top-banner-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 180px; 
            background: url(top.jpg) center/cover no-repeat;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            border-bottom: 2px solid rgba(255,255,255,0.05);
        }
        /* 배너 내부의 자연스러운 어둠 연출 */
        .top-banner-view::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, rgba(25, 35, 38, 0) 0%, #192326 100%);
        }

        /* 스크롤이 내려갔을 때 활성화될 클래스 */
        body.scrolled .hero-section {
            opacity: 0.3;
        }
        body.scrolled .top-banner-view {
            opacity: 1;
            visibility: visible;
        }

        /* 메인 콘텐츠 영역 (버튼들이 위치할 곳) */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
            position: relative;
            z-index: 10;
        }
        
        /* 상단 배너가 고정되었을 때 콘텐츠가 가려지지 않도록 여백 확보 */
        body.scrolled .main-content {
            margin-top: 140px;
        }

        /* 타이틀 섹션 (정보모음) */
        .section-title {
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: #9eb1b6;
            text-transform: uppercase;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        /* ========================================================
           게임 내 이벤트 영역 - 10초 자동 순환 및 PC 화살표 내장 슬라이더
           ======================================================== */
        .event-slider-container {
            width: 100%;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background: #11181a;
        }

        /* 격자형 톤앤매너 유지를 위한 안쪽 미세 테두리 */
        .event-slider-container::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            pointer-events: none;
            z-index: 5;
        }

        .slider-wrapper {
            display: flex;
            width: 100%;
            /* [변경] 고정 높이를 없애고 원본 이미지 비율(예: 16:9)을 유지하도록 설정 */
            aspect-ratio: 16 / 9; 
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide-item {
            min-width: 100%;
            height: 100%;
            position: relative;
        }

        /* 실제 스와이프될 이미지 파일명 등록 구역 */
        .slide-item:nth-child(1) { background: url('콜라보 배너 사이트.webp') center/cover no-repeat; }
        .slide-item:nth-child(2) { background: url('콜라보 이벤트 스토리.png') center/cover no-repeat; }
        .slide-item:nth-child(3) { background: url('콜라보 이벤트 보상 몽록.webp') center/cover no-repeat; }
        
        /* 이미지 로드 전 또는 미등록 상태 시 연출될 다크 가이드 스킨 */
        .slide-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #111719 0%, #1c272a 100%);
            color: #8a999d;
        }
        
        /* [추가] 링크 이동 가능 슬라이더용 커서 스타일 인터랙션 */
        .slide-item.clickable {
            cursor: pointer;
        }
        .slide-item.clickable:hover .slide-placeholder h3 {
            color: #ffffff;
            text-decoration: underline;
        }

        .slide-placeholder h3 {
            font-size: 1.5rem;
            color: #ccd7d9;
            margin-bottom: 8px;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        /* PC용 내비게이션 좌우 제어 화살표 디자인 */
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: rgba(17, 24, 26, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ccd7d9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.25s ease;
        }
        /* 화살표 내부 인게임 사각 싱크를 위한 앵글 처리 */
        .slider-arrow-inner {
            width: 12px;
            height: 12px;
            border-top: 2px solid #ccd7d9;
            border-right: 2px solid #ccd7d9;
            transition: border-color 0.25s;
        }
        .arrow-left { left: 20px; }
        .arrow-left .slider-arrow-inner { transform: rotate(-135deg); }
        .arrow-right { right: 20px; }
        .arrow-right .slider-arrow-inner { transform: rotate(45deg); }

        .slider-arrow:hover {
            background: #162023;
            border-color: rgba(255, 255, 255, 0.4);
        }
        .slider-arrow:hover .slider-arrow-inner {
            border-color: #ffffff;
        }

        /* 모바일 디바이스 등 터치 환경에서는 화살표를 자동 숨김 처리 */
        @media (max-width: 768px) {
            .slider-arrow { display: none; }
        }

        /* 하단 인디케이터 도트 래퍼 */
        .slider-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 6;
        }

        .dot {
            width: 10px;
            height: 10px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.4);
            transform: rotate(45deg);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* ========================================================
           3. 버튼 디자인 레이아웃 (남은 4개 필수 정보 그리드)
           ======================================================== */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .menu-item {
            position: relative;
            background: #11181a; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 140px;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            pointer-events: none;
        }

        .menu-item:hover {
            background: #162023;
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.05), 0 10px 20px rgba(0,0,0,0.4);
            transform: translateY(-2px);
        }

        .menu-item span {
            font-size: 1.15rem;
            font-weight: 500;
            color: #ccd7d9;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            transition: color 0.3s;
        }
        .menu-item:hover span {
            color: #ffffff;
        }

        .menu-item .icon-deco {
            width: 32px;
            height: 32px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            transform: rotate(45deg);
            transition: all 0.3s;
            position: relative;
        }
        .menu-item:hover .icon-deco {
            border-color: #ffffff;
            transform: rotate(135deg);
        }

        /* ========================================================
           [추가] 오디오 컨트롤러 스타일 (우측 하단 고정)
           ======================================================== */
        .audio-controller {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(17, 24, 26, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 15px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s, border-color 0.3s;
        }
        .audio-controller:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(22, 32, 35, 0.95);
        }
        .mute-btn {
            background: none;
            border: none;
            color: #ccd7d9;
            cursor: pointer;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            width: 24px;
            height: 24px;
        }
        .mute-btn:hover {
            color: #ffffff;
        }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            background: #ccd7d9;
            border-radius: 50%;
            transition: background 0.2s, transform 0.2s;
        }
        .volume-slider::-webkit-slider-thumb:hover {
            background: #ffffff;
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <audio id="bgm" src="사야의 노래.mp3" loop></audio>

    <div class="audio-controller">
        <button class="mute-btn" id="muteBtn" onclick="toggleMute()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M11.536 14.01A8.47 8.47 0 0 0 14 10c0-1.68-.487-3.243-1.325-4.556a.5.5 0 0 0-.85.526A7.47 7.47 0 0 1 13 10c0 1.472-.4 2.852-1.101 4.028a.5.5 0 0 0 .848.544z"/>
                <path d="M9.774 11.246A1 1 0 0 0 10 11V5a1 1 0 0 0-1.707-.707L5.828 6.757H4a1 1 0 0 0-1 1v1a1 1 0 0 0 1 1h1.828l2.465 2.465a1 1 0 0 0 .481.224z"/>
            </svg>
        </button>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.7" oninput="changeVolume(this.value)">
    </div>

    <div class="hero-section" id="hero"></div>

    <div class="top-banner-view" id="topBanner"></div>

    <div class="main-content">
        <h2 class="section-title">정보모음</h2>
        
        <div class="event-slider-container">
            <div class="slider-arrow arrow-left" onclick="prevSlide()"><div class="slider-arrow-inner"></div></div>
            <div class="slider-arrow arrow-right" onclick="nextSlide()"><div class="slider-arrow-inner"></div></div>

            <div class="slider-wrapper" id="sliderWrapper">
                <div class="slide-item clickable" onclick="window.open('https://www.bokyakuzenya.com/sp', '_blank')"></div>
                <div class="slide-item clickable" onclick="navigateToPage('event-detail-2')"></div>
                <div class="slide-item clickable" onclick="navigateToPage('event-detail-3')"></div>
            </div>
            
            <div class="slider-dots" id="sliderDots">
                <div class="dot active" onclick="goToSlide(0)"></div>
                <div class="dot" onclick="goToSlide(1)"></div>
                <div class="dot" onclick="goToSlide(2)"></div>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="navigateToPage('awakening')">
                <div class="icon-deco"></div>
                <span>각성체 정보</span>
            </div>
            <div class="menu-item" onclick="navigateToPage('myeongryun')">
                <div class="icon-deco"></div>
                <span>명륜 정보</span>
            </div>
            <div class="menu-item" onclick="navigateToPage('secret-contract')">
                <div class="icon-deco"></div>
                <span>비밀계약 정보</span>
            </div>
            <div class="menu-item" onclick="navigateToPage('coupon-code')">
                <div class="icon-deco"></div>
                <span>교환코드</span>
            </div>
        </div>
    </div>

    <script>
        // 오디오 제어 변수
        const bgm = document.getElementById('bgm');
        const volumeSlider = document.getElementById('volumeSlider');
        const muteBtn = document.getElementById('muteBtn');
        
        let userInteractedWithVolume = false; 
        let targetVolume = 0.7; // 목표로 하는 볼륨값
        let fadeAnimationId = null;

        // 브라우저 재생 정책 우회 인터랙션 활성화
        function initAudio() {
            if (bgm.paused) {
                bgm.play().then(() => {
                    smoothVolumeFade(); // 오디오 시작 후 페이드 루프 작동
                }).catch(e => console.log("오디오 재생 대기 중..."));
            }
        }
        window.addEventListener('click', initAudio, { once: true });
        window.addEventListener('scroll', initAudio, { once: true });

        // 부드러운 볼륨 전환을 처리하는 프레임 애니메이션 루프
        function smoothVolumeFade() {
            if (userInteractedWithVolume || bgm.muted) {
                // 사용자가 수동 조절 중이거나 음소거 상태면 자동 페이드 연산을 쉽니다.
                fadeAnimationId = requestAnimationFrame(smoothVolumeFade);
                return;
            }

            // 현재 볼륨에서 목표 볼륨으로 매 프레임마다 약 5%씩 서서히 접근 (감속 연산)
            const diff = targetVolume - bgm.volume;
            if (Math.abs(diff) > 0.005) {
                bgm.volume += diff * 0.05; 
                volumeSlider.value = bgm.volume;
            } else {
                bgm.volume = targetVolume;
                volumeSlider.value = targetVolume;
            }

            fadeAnimationId = requestAnimationFrame(smoothVolumeFade);
        }

        // 상단 배너 스크롤 트래킹 및 목표 볼륨 설정
        window.addEventListener('scroll', function() {
            const body = document.body;
            if (window.scrollY > 150) {
                body.classList.add('scrolled');
                if (!userInteractedWithVolume) {
                    targetVolume = 0.2; // 스크롤 내리면 부드럽게 줄여나갈 목표치
                }
            } else {
                body.classList.remove('scrolled');
                if (!userInteractedWithVolume) {
                    targetVolume = 0.7; // 상단으로 오면 부드럽게 키워나갈 목표치
                }
            }
        });

        // 사용자가 슬라이더 바를 마우스/터치로 직접 움직일 때 작동
        function changeVolume(val) {
            userInteractedWithVolume = true; 
            targetVolume = parseFloat(val);
            bgm.volume = targetVolume;
            bgm.muted = (targetVolume === 0);
            updateMuteIcon(bgm.muted);
        }

        // 음소거 처리
        function toggleMute() {
            userInteractedWithVolume = true; 
            bgm.muted = !bgm.muted;
            updateMuteIcon(bgm.muted);
            if (!bgm.muted && bgm.volume === 0) {
                bgm.volume = 0.5;
                targetVolume = 0.5;
                volumeSlider.value = 0.5;
            }
        }

        function updateMuteIcon(isMuted) {
            if (isMuted) {
                muteBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06zm7.137 2.096a.5.5 0 1 1 .708.708L12.707 8l1.855 1.846a.5.5 0 0 1-.708.708L12 8.707l-1.854 1.847a.5.5 0 1 1-.708-.708L11.293 8 9.438 6.154a.5.5 0 0 1 .708-.708L12 7.293l1.854-1.747z"/></svg>`;
            } else {
                muteBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M11.536 14.01A8.47 8.47 0 0 0 14 10c0-1.68-.487-3.243-1.325-4.556a.5.5 0 0 0-.85.526A7.47 7.47 0 0 1 13 10c0 1.472-.4 2.852-1.101 4.028a.5.5 0 0 0 .848.544z"/><path d="M9.774 11.246A1 1 0 0 0 10 11V5a1 1 0 0 0-1.707-.707L5.828 6.757H4a1 1 0 0 0-1 1v1a1 1 0 0 0 1 1h1.828l2.465 2.465a1 1 0 0 0 .481.224z"/></svg>`;
            }
        }

        // 10초 주기 무한 루프 배너 기믹
        let currentIdx = 0;
        const sliderWrapper = document.getElementById('sliderWrapper');
        const dots = document.querySelectorAll('.dot');
        const totalSlides = dots.length;
        const slideInterval = 10000; 

        function updateSlider() {
            sliderWrapper.style.transform = `translateX(-${currentIdx * 100}%)`;
            dots.forEach((dot, idx) => {
                if (idx === currentIdx) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        function nextSlide() {
            currentIdx++;
            if (currentIdx >= totalSlides) {
                currentIdx = 0;
            }
            updateSlider();
            resetTimer();
        }

        function prevSlide() {
            currentIdx--;
            if (currentIdx < 0) {
                currentIdx = totalSlides - 1;
            }
            updateSlider();
            resetTimer();
        }

        function goToSlide(idx) {
            currentIdx = idx;
            updateSlider();
            resetTimer();
        }

        let autoSlider = setInterval(nextSlide, slideInterval);

        function resetTimer() {
            clearInterval(autoSlider);
            autoSlider = setInterval(nextSlide, slideInterval);
        }

        // 하단 정보 버튼 라우터 함수
        function navigateToPage(menuType) {
            switch (menuType) {
                case 'awakening':
                    window.location.href = 'awakening.html'; 
                    break;
                case 'myeongryun':
                    window.location.href = 'myeongryun.html'; 
                    break;
                case 'secret-contract':
                    window.location.href = 'secret_contract.html'; 
                    break;
                case 'coupon-code':
                    window.location.href = 'coupon_code.html'; 
                    break;
                case 'event-detail-2':
                    window.location.href = 'event_detail_2.html';
                    break;
                case 'event-detail-3':
                    window.location.href = 'event_detail_3.html';
                    break;
                default:
                    console.log('연결 타겟이 매핑되지 않았습니다.');
            }
        }
    </script>
</body>
</html>
</body>
</html>
