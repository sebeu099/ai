<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>망각전야 - 각성체 정보</title>
    <style>
        /* 기본 스타일 초기화 및 배경색 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #192326;
            color: #e3e8e9;
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* 메인 레일 컨테이너 */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        /* 타이틀 섹션 양식 일치 */
        .section-title {
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: #9eb1b6;
            text-transform: uppercase;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        /* 상단 속성/계역별 필터 탭 시스템 */
        .tab-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }
        .tab-button {
            background: #11181a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ccd7d9;
            padding: 12px 30px;
            font-size: 1rem;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.25s ease;
            transform: skewX(-10deg); /* 인게임 쐐기형 각진 연출 */
        }
        .tab-button span {
            display: inline-block;
            transform: skewX(10deg);
        }
        .tab-button:hover, .tab-button.active {
            background: #162023;
            border-color: rgba(255, 255, 255, 0.4);
            color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
        }

        /* 각성체 전용 그리드 레이아웃 */
        .awakener-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            transition: all 0.4s ease;
        }

        /* 각성체 다크 마크업 카드 디자인 */
        .awakener-card {
            position: relative;
            background: #11181a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            opacity: 1;
            transform: scale(1);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), 
                        border-color 0.4s ease, 
                        box-shadow 0.4s ease,
                        opacity 0.3s ease,
                        background-color 0.4s ease;
        }

        /* 마우스를 가져가거나 탭 필터에 의해 강조될 때 카드가 크게 확대되는 효과 */
        .awakener-card:hover, .awakener-card.highlighted {
            background: #162023;
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            transform: translateY(-8px) scale(1.04);
            z-index: 5;
        }

        /* 기하학적 내부 테두리선 가이드 일치 */
        .awakener-card::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            pointer-events: none;
            z-index: 4;
        }

        /* 카드 초상화 프레임 구역 */
        .portrait-box {
            position: relative;
            width: 100%;
            height: 280px;
            background: #0d1214;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .portrait-box .char-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .awakener-card:hover .portrait-box .char-img,
        .awakener-card.highlighted .portrait-box .char-img {
            transform: scale(1.06);
        }

        /* 계역별 계보 속성 태그 데코 */
        .faction-tag {
            position: absolute;
            top: 15px; left: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 3px 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(17, 24, 26, 0.85);
            letter-spacing: 0.5px;
            z-index: 5;
        }
        .tag-dimension { border-color: #5aa9e6; color: #5aa9e6; } /* 초차원 */
        .tag-flesh { border-color: #e65a5a; color: #e65a5a; }     /* 혈육 */
        .tag-chaos { border-color: #a35ae6; color: #a35ae6; }     /* 혼돈 */
        .tag-deep { border-color: #5ae6cc; color: #5ae6cc; }      /* 심해 */

        /* 프로필 텍스트 파트 */
        .profile-desc {
            padding: 20px;
            text-align: center;
        }
        .char-name-kr { font-size: 1.3rem; font-weight: 700; color: #ffffff; letter-spacing: 1px; margin-bottom: 4px; }
        .char-name-en { font-size: 0.85rem; color: #8a999d; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
        .char-type-badge { font-size: 0.9rem; color: #b0bec2; display: inline-flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.04); padding: 4px 12px; }

        /* ========================================================
           [명륜 명세 기믹] 마우스 오버 및 상시 노출 시 슬라이딩 전개
           ======================================================== */
        .myeongryun-expand-layer {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.45s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
            padding: 0 15px;
            border-top: 1px solid rgba(255, 255, 255, 0);
            background: #0a0f10;
        }

        /* 1. 카드를 직접 호버하거나 2. 특정 탭 선택으로 강제 하이라이팅 되었을 때 명륜 활성화 */
        .awakener-card:hover .myeongryun-expand-layer,
        .awakener-card.highlighted .myeongryun-expand-layer {
            max-height: 280px; 
            opacity: 1;
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .myeongryun-title-label {
            font-size: 0.8rem;
            color: #8a999d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-align: left;
            border-left: 2px solid rgba(255,255,255,0.2);
            padding-left: 6px;
        }
        .myeongryun-pair-box { display: flex; gap: 10px; }
        .myeongryun-sub-card { flex: 1; background: #11181a; border: 1px solid rgba(255,255,255,0.05); padding: 10px 5px; text-align: center; }

        .myeongryun-slot-frame {
            width: 100%; height: 90px; background: #192326; margin-bottom: 8px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.02);
        }
        .myeongryun-slot-frame .myeong-img { width: 100%; height: 100%; object-fit: cover; }
        .myeong-text-title { font-size: 0.85rem; color: #ccd7d9; font-weight: 500; line-height: 1.3; }
        .myeong-rarity-tag { font-size: 0.7rem; display: inline-block; padding: 1px 4px; margin-top: 3px; background: rgba(255,255,255,0.04); color: #8a999d; }

        /* 비활성화 상태 카드 스킨 연출 (다른 테마 선택 시 흐릿하게 처리) */
        .awakener-card.faded {
            opacity: 0.25;
            transform: scale(0.95);
            pointer-events: none;
        }

        /* 뒤로가기 전용 메인 연동 홈버튼 */
        .back-home-container { text-align: center; margin-top: 40px; }
        .back-btn { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #ccd7d9; padding: 12px 30px; cursor: pointer; letter-spacing: 1px; transition: all 0.25s; }
        .back-btn:hover { border-color: #ffffff; color: #ffffff; background: #11181a; }
    </style>
</head>
